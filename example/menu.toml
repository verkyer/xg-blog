# 导航菜单模板。复制为 blog/menu.toml 后生效；用户文件存在时会整体替换此示例。
# label 为菜单文字，href 为链接，target = "blank" 表示新窗口打开。

[[menu]]
label = "首页"
href = "/"

[[menu]]
label = "示例文章"
href = "/archives/hello-world"
fallback = "posts"

[[menu]]
label = "示例页面"
href = "/demo-page"
fallback = "pages"

[[menu]]
label = "归档"
href = "/archives"

[[menu]]
label = "分类"
href = "/categories"

[[menu]]
label = "标签"
href = "/tags"

[[menu]]
label = "友链"
href = "/links"

[[menu]]
label = "外部链接"
href = "https://example.com"
target = "blank"
