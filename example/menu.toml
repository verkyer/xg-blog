# 导航菜单模板。复制为 blog/menu.toml 后生效；用户文件存在时会整体替换此示例。
# label 为菜单文字，href 为链接，target = "blank" 表示新窗口打开。
# href 留空则不跳转；如果该菜单有 sub，点击时只展开/收起二级菜单。
# fallback 是内部兜底兼容字段，普通用户不用写。

[[menu]]
label = "首页"
href = "/"

[[menu]]
label = "示例文章"
href = "/archives/hello-world"

[[menu]]
label = "示例页面"
href = "/demo-page"

[[menu]]
label = "更多"
href = ""

[[menu.sub]]
label = "归档"
href = "/archives"

[[menu.sub]]
label = "分类"
href = "/categories"

[[menu.sub]]
label = "标签"
href = "/tags"

[[menu.sub]]
label = "友链"
href = "/links"

[[menu]]
label = "项目地址"
href = "https://github.com/verkyer/xg-blog"
target = "blank"
